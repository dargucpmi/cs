<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Raf Bulucu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0d1b14;
    --panel:#13271c;
    --line:#274d38;
    --ink:#e8f3ec;
    --muted:#7da890;
    --accent:#34d27a;
    --warn:#e0573e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:flex;
    flex-direction:column;
    min-height:100dvh;
    padding:20px 16px 32px;
  }
  header{margin-bottom:22px}
  .eyebrow{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;
  }
  h1{
    font-size:30px;font-weight:700;letter-spacing:-.01em;line-height:1.05;
    font-family:Georgia,"Times New Roman",serif;
  }
  .wrap{flex:1;display:flex;flex-direction:column;gap:18px;max-width:520px;width:100%;margin:0 auto}
 
  #result{
    border:1px solid var(--line);
    background:var(--panel);
    border-radius:14px;
    padding:22px 20px;
    min-height:128px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .r-empty{color:var(--muted);font-size:14px;line-height:1.5}
  .r-code{font-size:12px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .r-shelf{font-size:46px;font-weight:700;font-family:Georgia,serif;color:var(--accent);line-height:1}
  .r-fail .r-shelf{color:var(--warn);font-size:22px}
  .r-meta{margin-top:12px;font-size:13px;line-height:1.5}
 
  .field{display:flex;gap:8px}
  input[type=text]{
    flex:1;background:#0a140e;border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:14px 14px;font-size:18px;font-family:inherit;
    letter-spacing:.06em;text-transform:uppercase;
  }
  input::placeholder{color:#456;text-transform:none;letter-spacing:0}
  input:focus{outline:none;border-color:var(--accent)}
  input:disabled{opacity:.5}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:15px;font-weight:600}
  .btn-go{background:var(--accent);color:#06140c;padding:0 22px}
  .btn-go:disabled{opacity:.4;cursor:default}
 
  footer{margin-top:22px;color:var(--muted);font-size:11px;line-height:1.6;text-align:center}
  footer code{color:var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Depo · Raf Sorgu</div>
      <h1>CS kodunu yaz<br>rafı gör</h1>
    </header>
 
    <div id="result">
      <div class="r-empty">Veri yükleniyor…</div>
    </div>
 
    <div class="field">
      <input id="code" type="text" inputmode="text" autocomplete="off"
             placeholder="CS kodu" disabled>
      <button class="btn-go" id="go" disabled>Ara</button>
    </div>
 
    <footer>
      Veri kaynağı: <code>data.xlsx</code> (1. kolon = CS kodu, 2. kolon = raf).<br>
      Link ile direkt sorgu: <code>?cs=CS1042</code>
    </footer>
  </div>
 
<script>
const DATA_FILE = "data.xlsx";   // repo kökündeki dosya adı
const SHELVES = new Map();        // CS kodu -> raf
 
const resultEl = document.getElementById('result');
const inputEl  = document.getElementById('code');
const goBtn    = document.getElementById('go');
 
const normalize = s => (s==null ? "" : String(s).trim().toUpperCase());
 
function setEmpty(msg){
  resultEl.className = '';
  resultEl.innerHTML = '<div class="r-empty">'+msg+'</div>';
}
function setFail(code, msg){
  resultEl.className = 'r-fail';
  resultEl.innerHTML =
    '<div class="r-code">'+code+'</div>'+
    '<div class="r-shelf">Bulunamadı</div>'+
    '<div class="r-meta">'+msg+'</div>';
}
function setHit(code, shelf){
  resultEl.className = '';
  resultEl.innerHTML =
    '<div class="r-code">'+code+'</div>'+
    '<div class="r-shelf">'+shelf+'</div>';
}
 
function lookup(raw){
  const code = normalize(raw);
  if(!code) return;
  if(SHELVES.has(code)) setHit(code, SHELVES.get(code));
  else setFail(code, 'Bu kod listede yok. Kodu kontrol et.');
}
 
async function loadData(){
  try{
    const res = await fetch(DATA_FILE);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    // header:1 -> her satır dizi olarak gelir; ilk iki kolonu al
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, blankrows:false });
    for(const row of rows){
      const code = normalize(row[0]);
      const shelf = row[1]==null ? "" : String(row[1]).trim();
      if(code && shelf) SHELVES.set(code, shelf);
    }
    if(SHELVES.size === 0){ setEmpty('Dosya okundu ama satır bulunamadı. data.xlsx içeriğini kontrol et.'); return; }
 
    inputEl.disabled = false; goBtn.disabled = false;
    inputEl.placeholder = 'CS kodu (örn. CS1042)';
    setEmpty('Hazır. CS kodunu yaz ve Ara’ya bas. ('+SHELVES.size+' kayıt)');
 
    const urlCode = new URLSearchParams(location.search).get('cs');
    if(urlCode){ inputEl.value = normalize(urlCode); lookup(urlCode); }
  }catch(err){
    setEmpty('Veri yüklenemedi ('+err.message+'). data.xlsx repo kökünde mi, sayfa HTTPS/sunucu üzerinden mi açıldı?');
  }
}
 
goBtn.addEventListener('click', ()=>lookup(inputEl.value));
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') lookup(inputEl.value); });
 
loadData();
</script>
</body>
</html>
